site_name: openfit
site_description: "Reproducible nonlinear curve fitting with publication-quality reports."
repo_url: https://github.com/priyamthakar/openfit
docs_dir: docs

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
    - Choosing Weights: weighting.md
    - Confidence Intervals: confidence-intervals.md
    - Model Comparison: model-comparison.md
    - Global Fitting: global-fit.md
    - ROUT Outlier Detection: rout.md
    - Reproducibility: reproducibility.md
  - Model Reference: models.md
  - Examples:
    - Dose-Response (4PL): notebooks/01_dose_response.ipynb
    - Model Comparison: notebooks/02_model_comparison.ipynb
    - ROUT Outlier Detection: notebooks/03_rout_outlier_detection.ipynb
    - Global Fitting: notebooks/04_global_fitting.ipynb
    - Reproducibility: notebooks/05_reproducibility.ipynb
    - Benchmark vs scipy: notebooks/06_benchmark_vs_scipy.ipynb
  - Benchmarks: benchmark.md
  - Coverage: coverage.md
  - API Reference:
    - fit: api/fit.md
    - results: api/results.md
    - models: api/models.md
    - compare: api/compare.md
    - diagnostics: api/diagnostics.md
    - uncertainty: api/uncertainty.md
    - global_fit: api/global_fit.md
    - outliers: api/outliers.md
    - spec: api/spec.md
    - io: api/io.md
    - cli: api/cli.md
