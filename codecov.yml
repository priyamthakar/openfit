coverage:
  status:
    project:
      default:
        target: auto          # require coverage doesn't drop
        threshold: 1%         # allow 1% tolerance
    patch:
      default:
        target: 80%           # new code in PRs should be 80%+ covered
comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
ignore:
  - "tests/**"
  - "docs/**"
  - "paper/**"
  - "recipe/**"
