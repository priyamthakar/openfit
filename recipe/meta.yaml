{% set name = "openfit" %}
{% set version = "0.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/openfit-{{ version }}.tar.gz
  sha256: SET_AFTER_PYPI_PUBLISH  # replace with actual sha256 after `pip download openfit==0.1.2` + sha256sum

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - openfit = openfit.cli:app

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling
  run:
    - python >=3.10
    - numpy >=1.24
    - pandas >=2.0
    - scipy >=1.11
    - matplotlib-base >=3.7
    - pydantic >=2.0

test:
  imports:
    - openfit
    - openfit.models
    - openfit.fit
    - openfit.results
    - openfit.spec
  commands:
    - openfit --help
    - openfit version
    - openfit models
  requires:
    - pip

about:
  home: https://github.com/priyamthakar/openfit
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Reproducible nonlinear curve fitting with publication-quality reports
  description: |
    openfit is a Python library for reproducible nonlinear curve fitting.
    It provides 29 built-in models (sigmoidal, exponential, enzyme-kinetic,
    growth, Gaussian, polynomial, binding), smart initial guesses, explicit
    weighting, profile-likelihood and bootstrap confidence intervals, ROUT
    outlier detection, global shared-parameter fitting, model comparison,
    and a FitSpec reproducibility manifest validated against all 27 NIST
    Statistical Reference Datasets.
  doc_url: https://priyamthakar.github.io/openfit/
  dev_url: https://github.com/priyamthakar/openfit

extra:
  recipe-maintainers:
    - priyamthakar
